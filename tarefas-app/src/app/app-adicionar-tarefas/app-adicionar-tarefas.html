<div style="border: 1px solid #ccc; padding: 20px; border-radius: 5px; margin-bottom: 20px; background-color: #f9f9f9;">
  <h2>Nova Tarefa</h2>
  <form (ngSubmit)="adicionar()">
    <div style="margin-bottom: 10px;">
      <label style="display: block; font-weight: bold;">Título:</label>
      <input type="text" [(ngModel)]="novaTarefa.titulo" name="titulo" required style="width: 100%; padding: 8px; box-sizing: border-box;">
    </div>

    <div style="margin-bottom: 10px;">
      <label style="display: block; font-weight: bold;">Descrição:</label>
      <textarea [(ngModel)]="novaTarefa.descricao" name="descricao" required style="width: 100%; padding: 8px; box-sizing: border-box;"></textarea>
    </div>

    <button type="submit" style="background-color: #008CBA; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px;">Salvar Tarefa</button>
  </form>
</div>
